<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognifyz Task 5 - Front-End Interaction</title>
    <style>
        :root {
            --primary: #5856d6;
            --success: #34c759;
            --danger: #ff3b30;
            --light: #f2f2f7;
            --dark: #1c1c1e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--light); color: var(--dark); padding: 2rem; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        h2 { margin-bottom: 1.5rem; border-bottom: 2px solid var(--light); padding-bottom: 0.5rem; }
        
        .form-inline { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
        input { flex: 1; padding: 0.75rem; border: 2px solid var(--light); border-radius: 6px; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--primary); }
        
        button { padding: 0.75rem 1.2rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; color: white; transition: background 0.2s; }
        .btn-add { background-color: var(--primary); }
        .btn-update { background-color: var(--success); padding: 0.4rem 0.8rem; font-size: 0.85rem; }
        .btn-delete { background-color: var(--danger); padding: 0.4rem 0.8rem; font-size: 0.85rem; }
        button:hover { opacity: 0.9; }

        .item-list { list-style: none; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: var(--light); margin-bottom: 0.5rem; border-radius: 6px; }
        .item-info { display: flex; flex-direction: column; gap: 0.25rem; }
        .item-title { font-weight: 600; }
        .item-status { font-size: 0.85rem; color: #666; }
        .actions { display: flex; gap: 0.5rem; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Dashboard Tracker (API Integration)</h2>
        
        <div class="form-inline">
            <input type="text" id="itemName" placeholder="Enter dashboard item name...">
            <button class="btn-add" id="addItemBtn">Add Item</button>
        </div>

        <ul id="itemList" class="item-list"></ul>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/items';
        const itemList = document.getElementById('itemList');
        const itemNameInput = document.getElementById('itemName');
        const addItemBtn = document.getElementById('addItemBtn');

        // 1. FETCH AND DISPLAY DATA (READ)
        async function fetchItems() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderItems(data);
            } catch (err) {
                console.error("Error fetching data from API:", err);
            }
        }

        function renderItems(items) {
            itemList.innerHTML = '';
            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'item-row';
                li.innerHTML = `
                    <div class="item-info">
                        <span class="item-title">${item.name}</span>
                        <span class="item-status">Status: <b>${item.status}</b></span>
                    </div>
                    <div class="actions">
                        <button class="btn-update" onclick="toggleStatus(${item.id}, '${item.name}', '${item.status}')">Toggle Status</button>
                        <button class="btn-delete" onclick="deleteItem(${item.id})">Delete</button>
                    </div>
                `;
                itemList.appendChild(li);
            });
        }

        // 2. POST DATA (CREATE)
        addItemBtn.addEventListener('click', async () => {
            const name = itemNameInput.value.trim();
            if (!name) return alert('Please enter an item name');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, status: 'In Progress' })
                });
                
                if(response.ok) {
                    itemNameInput.value = '';
                    fetchItems(); // Refresh layout
                }
            } catch (err) {
                console.error("Error creating item:", err);
            }
        });
